<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>FuelSync Admin - Add Station</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      background: #f3f4f6;
      color: #111827;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    h2 {
      margin-top: 0;
      color: #ff7a00;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #ff7a00;
    }

    .checkbox-group {
      display: flex;
      gap: 15px;
    }

    .checkbox-group label {
      font-weight: normal;
      display: inline-flex;
      align-items: center;
      cursor: pointer;
    }

    .checkbox-group input {
      margin-right: 6px;
      transform: scale(1.2);
    }

    button {
      padding: 12px 20px;
      background: #ff7a00;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      font-weight: 700;
      transition: background 0.2s;
    }

    button:hover {
      background: #e56d00;
    }

    button:disabled {
      opacity: 0.6;
      cursor: auto;
    }

    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 4px;
      display: none;
      font-weight: 500;
      text-align: center;
    }

    .success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #10b981;
      display: block;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #ef4444;
      display: block;
    }

    /* ── Auth: login screen ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f3f4f6;
    }
    #login-screen .auth-card {
      background: white;
      padding: 40px 32px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    #login-screen h1 { color: #ff7a00; margin: 0 0 8px; font-size: 1.6rem; }
    #login-screen p  { color: #6b7280; margin: 0 0 28px; font-size: 0.9rem; }
    #login-screen .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      width: 100%;
      justify-content: center;
      transition: background 0.15s, box-shadow 0.15s;
    }
    #login-screen .google-btn:hover {
      background: #f9fafb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    #login-screen .google-btn svg { flex-shrink: 0; }
    #access-denied {
      color: #991b1b;
      background: #fee2e2;
      border: 1px solid #ef4444;
      border-radius: 6px;
      padding: 10px 14px;
      margin-top: 16px;
      font-size: 0.88rem;
      display: none;
    }
    /* ── Auth: admin panel hidden until verified ── */
    #admin-panel { display: none; }
    #admin-topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 20px;
      margin-bottom: 20px;
    }
    #admin-topbar span { font-size: 0.9rem; color: #6b7280; }
    #logout-btn {
      padding: 7px 16px;
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      width: auto;
      transition: background 0.2s;
    }
    #logout-btn:hover { background: #dc2626; }
  </style>
</head>

<body>

  <!-- ── LOGIN SCREEN (shown when not authenticated) ── -->
  <div id="login-screen">
    <div class="auth-card">
      <h1>⚡ FuelSync</h1>
      <p>Admin Panel — restricted access only</p>
      <button class="google-btn" id="google-login-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Sign in with Google
      </button>
      <div id="access-denied">⛔ Access Denied — your account is not authorised.</div>
    </div>
  </div>

  <!-- ── ADMIN TOPBAR (shown when authenticated) ── -->
  <div id="admin-topbar">
    <span id="admin-user-label">Logged in as —</span>
    <button id="logout-btn">Logout</button>
  </div>

  <!-- ── ADMIN PANEL (hidden until auth verified) ── -->
  <div id="admin-panel">

  <div class="container">
    <h2>Add Station</h2>

    <form id="adminForm">
      <div class="form-group">
        <label>Station Name</label>
        <input type="text" id="name" placeholder="e.g. Shell Petrol Pump" required>
      </div>
      <div class="form-group">
        <label>Latitude (paste coords directly here to auto-split)</label>
        <input type="text" id="lat" placeholder="e.g. 19.9978767" required>
      </div>
      <div class="form-group">
        <label>Longitude</label>
        <input type="text" id="lng" placeholder="e.g. 73.7815847" required>
      </div>
      <div class="form-group">
        <label>Maps Link</label>
        <input type="text" id="mapsLink" placeholder="e.g. https://maps.google.com/..." required>
      </div>
      <div class="form-group">
        <label>Services</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="services" value="EV"> EV</label>
          <label><input type="checkbox" name="services" value="Petrol"> Petrol</label>
          <label><input type="checkbox" name="services" value="CNG"> CNG</label>
        </div>
      </div>
      <button type="submit" id="submitBtn">Add Station</button>
    </form>

    <div id="msg" class="message"></div>
  </div>

  <div class="container" style="margin-top: 20px;">
    <h2>Delete Station</h2>
    <form id="deleteForm">
      <div class="form-group">
        <label>Maps Link</label>
        <input type="text" id="delMapsLink" placeholder="e.g. https://maps.google.com/..." required>
      </div>
      <div class="form-group">
        <label>City</label>
        <input type="text" id="delCity" placeholder="e.g. Nashik" required>
      </div>
      <button type="submit" id="deleteBtn" style="background: #ef4444;">Delete Station</button>
    </form>

    <div id="delMsg" class="message"></div>
  </div>

  </div><!-- /#admin-panel -->

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // ── CHANGE THIS to your Gmail address ──
    const ALLOWED_EMAIL = 'ayushahirrao4@gmail.com';

    const firebaseConfig = {
      apiKey: "AIzaSyBYoR_OTowzepYYgzFr3g-DHieOc6lCHVA",
      authDomain: "fuel-sync-77081.firebaseapp.com",
      projectId: "fuel-sync-77081"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ── DOM refs ──
    const loginScreen  = document.getElementById('login-screen');
    const adminPanel   = document.getElementById('admin-panel');
    const adminTopbar  = document.getElementById('admin-topbar');
    const adminLabel   = document.getElementById('admin-user-label');
    const accessDenied = document.getElementById('access-denied');

    // ── Google login button ──
    document.getElementById('google-login-btn').addEventListener('click', async () => {
      try {
        accessDenied.style.display = 'none';
        await signInWithPopup(auth, provider);
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
          console.error('[Admin Auth]', err);
        }
      }
    });

    // ── Logout button ──
    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    // ── Auth state gate ──
    onAuthStateChanged(auth, (user) => {
      if (user && user.email === ALLOWED_EMAIL) {
        // ✅ Authorised
        loginScreen.style.display  = 'none';
        adminPanel.style.display   = 'block';
        adminTopbar.style.display  = 'flex';
        adminLabel.textContent     = `Logged in as ${user.email}`;
      } else if (user) {
        // ⛔ Wrong email — sign out immediately
        accessDenied.style.display = 'block';
        signOut(auth);
      } else {
        // Not logged in
        loginScreen.style.display  = 'flex';
        adminPanel.style.display   = 'none';
        adminTopbar.style.display  = 'none';
      }
    });

    const form = document.getElementById('adminForm');
    const latInput = document.getElementById('lat');
    const lngInput = document.getElementById('lng');
    const msgDiv = document.getElementById('msg');
    const submitBtn = document.getElementById('submitBtn');

    function showMsg(text, type) {
      msgDiv.textContent = text;
      msgDiv.className = 'message ' + type;
    }

    // STEP 1: INPUT BEHAVIOR
    // Split ONLY on paste event, do NOT use input event
    latInput.addEventListener('paste', (e) => {
      const pastedText = (e.clipboardData || window.clipboardData).getData('text');

      if (pastedText.includes(',')) {
        const parts = pastedText.split(',');
        if (parts.length >= 2) {
          const pLat = parts[0].trim();
          const pLng = parts[1].trim();

          if (!isNaN(parseFloat(pLat)) && !isNaN(parseFloat(pLng))) {
            e.preventDefault();
            latInput.value = pLat;
            lngInput.value = pLng;
          }
        }
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      showMsg('', '');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Processing...';

      try {
        // STEP 4: DATA NORMALIZATION
        const rawName = document.getElementById('name').value.trim();
        const rawLat = latInput.value.trim();
        const rawLng = lngInput.value.trim();
        const rawLink = document.getElementById('mapsLink').value.trim();
        const normalizedLink = rawLink.toLowerCase();

        const latNum = Number(rawLat);
        const lngNum = Number(rawLng);

        // STEP 2: SERVICES INPUT
        const selectedServices = Array.from(document.querySelectorAll('input[name="services"]:checked')).map(cb => cb.value);

        // STEP 5: VALIDATION
        if (!rawLat || !rawLng) throw new Error("Latitude and Longitude cannot be empty.");
        if (isNaN(latNum) || isNaN(lngNum)) throw new Error("Latitude and Longitude must be valid numbers.");
        if (latNum < -90 || latNum > 90) throw new Error("Latitude must be between -90 and 90.");
        if (lngNum < -180 || lngNum > 180) throw new Error("Longitude must be between -180 and 180.");
        if (selectedServices.length === 0) throw new Error("Please select at least one service.");

        // STEP 6 & 7: DUPLICATE PREVENTION & FLOW
        const querySnapshot = await getDocs(collection(db, "stations"));
        let isDuplicate = false;

        querySnapshot.forEach((doc) => {
          const data = doc.data();

          // SECONDARY CHECK (MAP LINK)
          if (data.mapsLink && data.mapsLink.trim().toLowerCase() === normalizedLink) {
            isDuplicate = true;
          }

          // PRIMARY CHECK (LOCATION)
          if (typeof data.lat === 'number' && typeof data.lng === 'number') {
            const diffLat = Math.abs(data.lat - latNum);
            const diffLng = Math.abs(data.lng - lngNum);
            if (diffLat < 0.0005 && diffLng < 0.0005) {
              isDuplicate = true;
            }
          }
        });

        if (isDuplicate) {
          throw new Error("Station already exists");
        }

        // STEP 8: DATA STRUCTURE
        const newDoc = {
          name: rawName,
          lat: latNum,
          lng: lngNum,
          mapsLink: rawLink,
          services: selectedServices,
          city: "Nashik" // STEP 3: DEFAULT CITY
        };

        // STEP 9: SAFE INSERT
        await addDoc(collection(db, "stations"), newDoc);

        showMsg("Station added successfully!", "success");
        form.reset();

      } catch (err) {
        showMsg(err.message, "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Add Station';
      }
    });

    // --- DELETE STATION LOGIC ---
    const deleteForm = document.getElementById('deleteForm');
    const delMsgDiv = document.getElementById('delMsg');
    const deleteBtn = document.getElementById('deleteBtn');

    function showDelMsg(text, type) {
      delMsgDiv.textContent = text;
      delMsgDiv.className = 'message ' + type;
    }

    deleteForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      showDelMsg('', '');

      const rawLink = document.getElementById('delMapsLink').value.trim();
      const rawCity = document.getElementById('delCity').value.trim();

      if (!rawLink) return showDelMsg("Maps link cannot be empty.", "error");
      if (!rawCity) return showDelMsg("City cannot be empty.", "error");

      const confirmDelete = confirm("Are you sure you want to delete this station?");
      if (!confirmDelete) return;

      deleteBtn.disabled = true;
      deleteBtn.textContent = 'Processing...';

      try {
        const normalizedLink = rawLink.toLowerCase();
        const normalizedCity = rawCity.toLowerCase();

        const querySnapshot = await getDocs(collection(db, "stations"));
        let targetDocId = null;

        for (const docSnapshot of querySnapshot.docs) {
          const data = docSnapshot.data();
          
          const docLink = data.mapsLink ? data.mapsLink.trim().toLowerCase() : "";
          const docCity = data.city ? data.city.trim().toLowerCase() : "";

          if (docLink === normalizedLink && docCity === normalizedCity) {
            targetDocId = docSnapshot.id;
            break; // Find ONLY the FIRST matching document
          }
        }

        if (!targetDocId) {
          throw new Error("No matching station found");
        }

        await deleteDoc(doc(db, "stations", targetDocId));
        showDelMsg("Station deleted successfully!", "success");
        deleteForm.reset();
      } catch (err) {
        showDelMsg(err.message, "error");
      } finally {
        deleteBtn.disabled = false;
        deleteBtn.textContent = 'Delete Station';
      }
    });

  </script>
</body>

</html>
